<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>امپراتوری پارس | ورود</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/css/dialog.css">
    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

    <!-- Background -->
    <div class="bg"></div>

    <div class="overlay"></div>

    <!-- Server Bar -->
    <div class="top-bar">

        🏛 امپراتوری پارس | سرور آزمایشی Alpha | آنلاین

    </div>

    <!-- Main -->
    <main class="wrapper">

        <div class="panel-wrapper">

            <!-- Stone Panel -->
            <img src="/images/panel.png" class="panel-bg" draggable="false" alt="panel">

            <!-- Logo -->
            <div class="logo-container">

                <img src="/images/logo.png" alt="Empire">

            </div>

            <!-- Banner -->
            <div class="panel-banner">

                <img src="/images/server-login-bg.png" alt="ورود">

            </div>

            <!-- Content -->
            <div class="panel-content">

                <form id="loginForm">

                    <!-- Username -->

                    <div class="input-group">

                        <img src="/images/ui/icons/user.png" class="input-icon-right" alt="user">

                        <input id="username" type="text" autocomplete="username"
                            placeholder="نام کاربری خود را وارد کنید">

                    </div>

                    <!-- Password -->

                    <div class="input-group">

                        <img src="/images/ui/icons/lock.png" class="input-icon-right" alt="lock">

                        <input id="password" type="password" autocomplete="current-password"
                            placeholder="رمز عبور خود را وارد کنید">

                        <img src="/images/ui/icons/eye.png" id="togglePassword" class="input-icon-left" alt="eye">

                    </div>

                    <!-- Login -->

                    <button class="login-btn" type="submit">
                    </button>

                </form>

                <a href="#" class="forgot-password">

                    رمز عبور خود را فراموش کرده‌اید؟

                </a>

                <div class="separator"></div>

                <div class="register-section">

                    <p>

                        حساب کاربری ندارید؟

                    </p>

                    <button class="register-btn" type="button">

                    </button>

                </div>

            </div>

        </div>
    </main>

    <script src="/js/login.js"></script>
    <script src="/js/dialog.js"></script>

    <!-- ==========================================
     GAME DIALOG
========================================== -->

    <div id="gameDialog" class="dialog hidden">

        <!-- پس زمینه تار -->

        <div class="dialog-overlay"></div>

        <!-- پنجره -->

        <div class="dialog-window">

            <!-- سایه -->

            <img src="/images/ui/dialogs/dialog-shadow.png" class="dialog-shadow" draggable="false" alt="">

            <!-- پنل -->

            <img src="/images/ui/dialogs/dialog-panel.png" class="dialog-panel" draggable="false" alt="">

            <!-- هدر -->

            <img src="/images/ui/dialogs/dialog-header.png" class="dialog-header" draggable="false" alt="">

            <!-- دکمه بستن -->

            <button id="dialogClose" class="dialog-close" type="button" aria-label="بستن"></button>

            <!-- عنوان -->

            <div id="dialogTitle" class="dialog-title">
            </div>

            <!-- متن -->

            <div id="dialogBody" class="dialog-body">
            </div>

            <!-- دکمه -->

            <button id="dialogButton" class="dialog-button" type="button">
            </button>

        </div>

    </div>
</body>

</html>
