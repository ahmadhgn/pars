<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امپراتوری پارس - ورود</title>

    <link rel="stylesheet" href="/css/login.css">

    <link href="/css/fonts.css" rel="stylesheet">
</head>

<body>

    <!-- BACKGROUND -->
    <div class="bg"></div>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
        🏛 امپراتوری پارس | سرور آزمایشی Alpha | آنلاین
    </div>

    <!-- MAIN WRAPPER -->
    <div class="wrapper">


        <!-- LOGIN PANEL -->
        <div class="panel-wrapper">

            <img src="/images/panel.png" class="panel-bg" alt="panel">

            <div class="panel-content">
                <!-- LOGO -->
                <div class="logo-container">
                    <img src="/images/logo.png" alt="امپراتوری پارس">
                </div>
                <div class="panel-banner">
                    ورود به سرور
                </div>

                <form id="loginForm">

                    <input id="username" type="text" placeholder="نام کاربری">

                    <input id="password" type="password" placeholder="رمز عبور">

                    <button type="submit">ورود</button>

                </form>

            </div>

        </div>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
