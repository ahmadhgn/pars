<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ثبت نام</title>
</head>
<body>

<h1>ثبت نام در تراوین</h1>

<form method="POST" action="/auth/register">

    <input
        type="text"
        name="username"
        placeholder="نام کاربری"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="رمز عبور"
        required>

    <br><br>

    <button type="submit">
        ثبت نام
    </button>

</form>

</body>
</html>
